# Sage Main Configuration
#
# This file defines global defaults and per-agent overrides for Sage.
# Override priority (lowest → highest):
#   1. [defaults]            — global defaults
#   2. [agents.<name>]       — per-agent overrides
#   3. Agent .md frontmatter — highest priority
#
# Paths:
#   CLI:  --config path/to/config.toml
#   Env:  SAGE_CONFIG_PATH=path/to/config.toml
#   Default: ~/.config/sage/config.toml

# skills_dir = "${HOME}/.agents/skills/"  # Global skills directory. If unset, waterfall: $cwd/skills -> ~/.agents/skills -> ~/.claude/skills

# ─── Agent Discovery ──────────────────────────────────────────────────────
# Where to find agent .md files (relative to CWD).
agents_dir = "agents/"

# Primary agent (entry point for CLI commands when no agent is specified).
# Agents in agents_dir are auto-discovered as subagents of the primary.
# primary = "assistant"

# ─── Environment Variables ──────────────────────────────────────────────────
# Resolved at startup. Values can reference env vars with ${VAR} syntax.
# Resolution order: config.toml [env] > .env file > os.environ
# Unresolved ${VAR} references cause a startup error.
[env]
AZURE_AI_API_KEY = "${AZURE_AI_API_KEY}"
AZURE_AI_API_BASE = "${AZURE_AI_API_BASE}"

# ─── Global Defaults ──────────────────────────────────────────────────────────
[defaults]

# LLM model identifier (provider/model format)
model = "azure_ai/kimi-k2.5"

# Maximum agentic turns before stopping
max_turns = 10

# Maximum delegation depth (prevents infinite recursion)
max_depth = 3

# Custom tool extensions (list of Python module paths)
# extensions = ["myapp.tools"]

# ── Model Parameters ──────────────────────────────────────────────────────────
# Only set fields are forwarded to the provider; omitted fields use provider defaults.
[defaults.model_params]
temperature = 0.0
max_tokens = 4096
# top_p = 1.0
# top_k = 40
# frequency_penalty = 0.0
# presence_penalty = 0.0
# seed = 42
# stop = ["END"]
# timeout = 120.0
# response_format = { type = "json_object" }

# ── Permission ────────────────────────────────────────────────────────────────
# Controls what actions agents can take without asking.
[defaults.permission]
shell = "ask"
memory_store = "allow"

# ── Context Management ────────────────────────────────────────────────────────
# Token-aware context window management.
[defaults.context]
compaction_threshold = 0.75   # fraction of context window that triggers compaction
reserve_tokens = 4096         # tokens reserved for model output
prune_tool_outputs = true     # truncate large tool outputs
tool_output_max_chars = 5000  # max chars per tool output before truncation

# ── Planning Pipeline ─────────────────────────────────────────────────────────
# Optional plan creation, analysis, and iterative review.
# When enabled, agents gain plan_create / plan_status / plan_update / plan_review
# tools. Plans are persisted as JSON and can be reviewed iteratively by an LLM.
#
# planning.analysis  — hook that fires ON_PLAN_CREATED to analyze new plans.
# planning.review    — iterative LLM-driven review loop (critique → revise → re-check).
#
# Both sub-sections are opt-in. Omit or set enabled = false to disable.

# Uncomment to enable planning globally (all agents):
[defaults.planning.analysis]
enabled = true
# prompt = "Analyze this plan for completeness and feasibility."

[defaults.planning.review]
enabled = true
max_iterations = 3      # Maximum review-revise cycles (default: 3)
# prompt = "Review this plan. Flag gaps, contradictions, or missing steps."

# ── MCP Servers ───────────────────────────────────────────────────────────────
# Model Context Protocol server connections.
# Each server uses either stdio (command) or sse (url) transport.
#
# [defaults.mcp_servers.filesystem]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem"]
# env = { ROOT_DIR = "/workspace" }
#
# [defaults.mcp_servers.my-sse-server]
# transport = "sse"
# url = "http://localhost:8080/sse"

[defaults.mcp_servers.context7]
transport = "stdio"
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[defaults.mcp_servers.sequentialthinking]
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking@latest"]


# ─── Per-Agent Overrides ──────────────────────────────────────────────────────
# Each [agents.<name>] section overrides [defaults] for a specific agent.
# The <name> must match the agent's "name" field in its .md frontmatter.

[agents.researcher]
model = "azure_ai/kimi-k2.5"
max_turns = 20

[agents.researcher.model_params]
temperature = 0.0
max_tokens = 8192

# ── Agent-only fields (not available in [defaults]) ──────────────────────────
# memory: persistent memory backend configuration
# skills: optional list of skill names to load for this agent (allowlist)

[agents.researcher.memory]
backend = "sqlite"
path = "memory.db"
embedding = "text-embedding-3-large"
compaction_threshold = 50

# skills = ["git-master", "terraform"]  # Optional: limit this agent to specific skills

# ── Planning (per-agent) ─────────────────────────────────────────────────────
# Enable planning for the researcher with a custom analysis prompt.
# The review loop uses up to 4 iterations with a domain-specific rubric.

[agents.researcher.planning.analysis]
enabled = true
prompt = "Evaluate whether the plan covers all research angles and cites sources."

[agents.researcher.planning.review]
enabled = true
max_iterations = 4
prompt = "Review the research plan. Check for: missing perspectives, unsupported claims, and logical gaps."

[agents.summarizer]
model = "azure_ai/gpt-4o"
max_turns = 5

[agents.summarizer.model_params]
temperature = 0.2
max_tokens = 2048

# Planning disabled for summarizer (default) — uncomment to enable:
# [agents.summarizer.planning.analysis]
# enabled = true
# prompt = "Check that the summary plan captures all key points from the source material."
