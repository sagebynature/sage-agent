name: Sage Code Review

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  sage-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so the agent can inspect git log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install sage-agent
        run: uv pip install sage-agent

      - name: Run Sage code review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run sage exec AGENTS.md \
            --input "Review the most recent changes in this repository. Focus on correctness, security, and code quality. Output a concise summary of findings." \
            --deny-all \
            --output jsonl \
            --timeout 120 \
          | tee sage-review.jsonl

      - name: Upload review results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sage-review
          path: sage-review.jsonl
          retention-days: 30

